services:
  # ── BACKEND SERVER ──
  - type: web
    name: dozanda-hr-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # You will copy your Supabase Connection URL here in the Render dashboard!

  # ── FRONTEND WEBSITE ──
  - type: web
    name: dozanda-hr-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://dozanda-hr-backend.onrender.com" # This automatically connects your frontend to your new live backend!
